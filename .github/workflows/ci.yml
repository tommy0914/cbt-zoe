name: CI

on:
  push:
    branches: [ main, testing ]
  pull_request:
    branches: [ main, testing ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cbt-software/backend-nestjs/package-lock.json
      - name: Install dependencies
        working-directory: cbt-software/backend-nestjs
        run: npm ci
      - name: Generate Prisma Client
        working-directory: cbt-software/backend-nestjs
        run: npx prisma generate
      - name: Run Tests
        working-directory: cbt-software/backend-nestjs
        run: npm run test
      - name: Build
        working-directory: cbt-software/backend-nestjs
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cbt-software/frontend/cbt-admin-frontend/package-lock.json
      - name: Install dependencies
        working-directory: cbt-software/frontend/cbt-admin-frontend
        run: npm ci
      - name: Lint
        working-directory: cbt-software/frontend/cbt-admin-frontend
        run: npm run lint
      - name: Build
        working-directory: cbt-software/frontend/cbt-admin-frontend
        run: npm run build
